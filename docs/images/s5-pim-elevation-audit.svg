<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">S5 PIM Elevation Audit Workflow</title>
  <desc id="desc">Workflow diagram for PIM elevation audit and alignment classification.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#1e1e1e"/></marker>
    <style>text{font-family:Inter,Arial,sans-serif;fill:#1e1e1e}.label{font-size:16px;font-weight:600}.small{font-size:14px;fill:#555}.box{stroke-width:2;rx:14;ry:14}.line{stroke:#1e1e1e;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1200" height="760" fill="#fff"/>
  <rect x="40" y="50" width="1040" height="640" rx="18" fill="#e5dbff" stroke="#8b5cf6" opacity=".45"/>
  <rect class="box" x="80" y="180" width="190" height="80" fill="#fff3bf" stroke="#f59e0b"/>
  <text x="175" y="212" text-anchor="middle" class="label">Entra PIM</text><text x="175" y="234" text-anchor="middle" class="label">role activation</text>
  <rect class="box" x="360" y="170" width="190" height="90" fill="#eebefa" stroke="#ec4899"/>
  <text x="455" y="203" text-anchor="middle" class="label">AuditLogs</text><text x="455" y="225" text-anchor="middle" class="label">activation + justification</text>
  <rect class="box" x="360" y="330" width="190" height="90" fill="#eebefa" stroke="#ec4899"/>
  <text x="455" y="363" text-anchor="middle" class="label">AzureActivity</text><text x="455" y="385" text-anchor="middle" class="label">operations in window</text>
  <rect class="box" x="660" y="240" width="220" height="100" fill="#d0bfff" stroke="#8b5cf6"/>
  <text x="770" y="278" text-anchor="middle" class="label">pim-elevation agent</text><text x="770" y="301" text-anchor="middle" class="label">daily/manual run</text>
  <polygon points="775,460 860,520 775,580 690,520" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="775" y="526" text-anchor="middle" class="label">Aligned?</text>
  <rect class="box" x="430" y="610" width="180" height="70" fill="#c3fae8" stroke="#06b6d4"/>
  <text x="520" y="638" text-anchor="middle" class="label">JSON report</text><text x="520" y="660" text-anchor="middle" class="label">per activation</text>
  <rect class="box" x="900" y="610" width="170" height="70" fill="#b2f2bb" stroke="#22c55e"/>
  <text x="985" y="638" text-anchor="middle" class="label">Email summary</text><text x="985" y="660" text-anchor="middle" class="label">review findings</text>
  <rect class="box" x="900" y="390" width="170" height="80" fill="#ffc9c9" stroke="#ef4444"/>
  <text x="985" y="422" text-anchor="middle" class="label">NotAligned</text><text x="985" y="444" text-anchor="middle" class="label">security review</text>
  <path class="line" d="M270 220 H360"/>
  <path class="line" d="M175 260 V455 H455 V420"/>
  <path class="line" d="M550 215 H610 V270 H660"/><text x="590" y="205" text-anchor="middle" class="small">query</text>
  <path class="line" d="M550 375 H610 V320 H660"/><text x="590" y="395" text-anchor="middle" class="small">correlate</text>
  <path class="line" d="M770 340 V460"/>
  <path class="line" d="M720 560 H640 V645 H610"/>
  <path class="line" d="M830 560 H860 V645 H900"/>
  <path class="line" d="M860 520 H940 V470"/><text x="900" y="508" text-anchor="middle" class="small">flag</text>
