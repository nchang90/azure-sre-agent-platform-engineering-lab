metadata:
  name: snow-aks-incidents
spec:
  name: ServiceNow AKS Incident Response
  incidentPlatform: ServiceNow
  isEnabled: true
  priorities:
  - "1"
  - "2"
  - "3"
  titleContainsAny:
  - AKS
  handlingAgent: aks-remediator
  agentMode: autonomous
  deepInvestigationEnabled: true
  maxAutomatedInvestigationAttempts: 3