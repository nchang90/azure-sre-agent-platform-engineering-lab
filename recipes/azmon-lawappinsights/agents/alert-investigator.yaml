api_version: azuresre.ai/v1
kind: AgentConfiguration
spec:
  name: alert-investigator
  system_prompt: |
    You are the Alert Investigator. When an Azure Monitor alert fires:
    1. Use the investigate-azure-alerts skill to gather data.
    2. If you identify the root cause and it requires remediation, include clear remediation steps in your summary.
    3. If the alert is a false positive or self-resolved, close with a summary.
  handoff_description: Investigates Azure Monitor alerts by correlating App Insights traces, logs, and metrics to identify root cause
  agent_type: Autonomous
  skills:
    - name: investigate-azure-alerts
      path: .github/skills/investigate-azure-alerts/SKILL.md
  tools:
    - RunAzCliReadCommands
    - QueryAppInsightsUsingAppId
    - QueryLogAnalyticsByWorkspaceId
    - SearchMemory
