name: Deploy SRE Agent Lab

on:
  workflow_dispatch:
    inputs:
      plan:
        description: "Run Terraform plan"
        required: false
        type: boolean
        default: true
      apply:
        description: "Run Terraform apply and post-provision"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: sre-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Python dependencies
        run: python3 -m pip install --user pyyaml

      - name: Terraform init
        run: terraform -chdir=infra init

      - name: Terraform plan
        if: ${{ inputs.plan || inputs.apply }}
        run: terraform -chdir=infra plan -out=tfplan -var-file=terraform.tfvars

      - name: Terraform apply
        if: ${{ inputs.apply }}
        run: terraform -chdir=infra apply -auto-approve tfplan

      - name: Run post-provision setup
        if: ${{ inputs.apply }}
        run: bash scripts/post-provision.sh