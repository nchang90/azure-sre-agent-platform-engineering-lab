name: Deploy SRE Agent Lab

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - demo
          - sbox
        default: sbox
      plan:
        description: "Run Terraform plan"
        type: boolean
        default: true
      apply:
        description: "Run Terraform apply"
        type: boolean
        default: true

  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment || 'sbox' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v2.1.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3.1.0
        with:
          terraform_wrapper: false

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Terraform init
        run: terraform -chdir=infra/terraform init -backend-config=backend/${{ env.ENVIRONMENT }}.backend.tfvars

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

      - name: Terraform plan
        run: terraform -chdir=infra/terraform plan -out=tfplan -var-file=environments/${{ env.ENVIRONMENT }}.tfvars

      - name: Terraform apply
        run: terraform -chdir=infra/terraform apply -auto-approve tfplan

      - name: Run core post-provision setup
        shell: bash
        run: bash scripts/post-provision.sh
        continue-on-error: true
