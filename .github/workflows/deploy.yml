name: Deploy SRE Agent Lab

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - demo
          - sbox
        default: sbox
      plan:
        description: "Run Terraform plan"
        type: boolean
        default: true
      apply:
        description: "Run Terraform apply"
        type: boolean
        default: true
      simulate_aks_incident:
        description: "Deploy a broken AKS pod and create a ServiceNow incident"
        type: boolean
        default: false

  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment || 'sbox' }}
      TF_VAR_service_now_password: ${{ secrets.SERVICENOW_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v2.1.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3.1.0
        with:
          terraform_wrapper: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Terraform init
        run: terraform -chdir=infra/terraform init -backend-config=backend/${{ env.ENVIRONMENT }}.backend.tfvars

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

      - name: Terraform plan
        run: terraform -chdir=infra/terraform plan -out=tfplan -var-file=environments/${{ env.ENVIRONMENT }}.tfvars

      - name: Terraform apply
        run: terraform -chdir=infra/terraform apply -auto-approve tfplan

      - name: Apply recipe extras
        shell: bash
        run: bash scripts/apply-extras.sh "${ENVIRONMENT}"

      - name: Deploy AKS workload
        shell: bash
        run: |
          set -euo pipefail

          TF_OUT="$(terraform -chdir=infra/terraform output -json)"
          read_tf() { echo "$TF_OUT" | jq -r ".${1}.value // empty"; }

          AKS_NAME="$(read_tf aks_name)"
          if [[ -z "$AKS_NAME" ]]; then
            echo "AKS stack is disabled for this environment; skipping AKS workload deployment."
            exit 0
          fi

          AGENT_ID="$(read_tf agent_id)"
          RG="$(echo "$AGENT_ID" | cut -d/ -f5)"

          az aks get-credentials \
            --resource-group "$RG" \
            --name "$AKS_NAME" \
            --admin \
            --overwrite-existing

          kubectl apply -f infra/k8s/orders-api.yaml
          if ! kubectl rollout status deployment/orders-api --namespace default --timeout=180s; then
            kubectl get pods --namespace default -l app=orders-api -o wide
            kubectl describe deployment/orders-api --namespace default
            kubectl describe pods --namespace default -l app=orders-api
            bash scripts/create-servicenow-incident.sh \
              "${ENVIRONMENT}" \
              "AKS orders-api rollout failed in ${ENVIRONMENT}" \
              "The GitHub Actions deployment connected to AKS cluster ${AKS_NAME} in resource group ${RG}, applied infra/k8s/orders-api.yaml, and deployment/orders-api did not become available within 180 seconds. Review the workflow pod describe output for scheduling, image pull, quota, or readiness details."
            exit 1
          fi

          if [[ "${{ inputs.simulate_aks_incident || false }}" == "true" ]]; then
            echo "Simulating AKS incident with broken orders-api image..."
            kubectl apply -f infra/k8s/orders-api-broken.yaml

            if kubectl rollout status deployment/orders-api --namespace default --timeout=120s; then
              echo "Broken AKS incident simulation unexpectedly rolled out successfully."
              exit 1
            fi

            kubectl get pods --namespace default -l app=orders-api -o wide
            kubectl describe deployment/orders-api --namespace default
            kubectl describe pods --namespace default -l app=orders-api

            bash scripts/create-servicenow-incident.sh \
              "${ENVIRONMENT}" \
              "AKS orders-api broken pod in ${ENVIRONMENT}" \
              "The GitHub Actions deployment intentionally applied infra/k8s/orders-api-broken.yaml to AKS cluster ${AKS_NAME} in resource group ${RG}. The orders-api deployment did not roll out because the pod image is intentionally broken. This incident has priority 2 and title contains AKS, so it should match the snow-aks-incidents response plan and appear on the Azure SRE Agent incidents page after ServiceNow ingestion."
          fi

      - name: Build and update Container Apps
        shell: bash
        run: |
          set -euo pipefail

          TF_OUT="$(terraform -chdir=infra/terraform output -json)"
          read_tf() { echo "$TF_OUT" | jq -r ".${1}.value // empty"; }

          ACR_NAME="$(read_tf acr_name)"
          if [[ -z "$ACR_NAME" ]]; then
            echo "Container Apps stack is disabled for this environment; skipping image build and app updates."
            exit 0
          fi

          ACR_LOGIN_SERVER="$(read_tf acr_login_server)"
          ORDERS_API_NAME="$(read_tf orders_api_name)"
          CHANGE_LOOKUP_NAME="$(read_tf change_lookup_name)"
          AGENT_ID="$(read_tf agent_id)"
          RG="$(echo "$AGENT_ID" | cut -d/ -f5)"

          echo "Building images in ACR: $ACR_NAME"

          az acr build --registry "$ACR_NAME" --image orders-api:latest src/orders-api/
          az acr build --registry "$ACR_NAME" --image change-lookup:latest src/change-lookup/

          echo "Updating Container Apps…"

          az containerapp update \
            --name "$ORDERS_API_NAME" \
            --resource-group "$RG" \
            --image "$ACR_LOGIN_SERVER/orders-api:latest" \
            --output none

          az containerapp update \
            --name "$CHANGE_LOOKUP_NAME" \
            --resource-group "$RG" \
            --image "$ACR_LOGIN_SERVER/change-lookup:latest" \
            --output none

