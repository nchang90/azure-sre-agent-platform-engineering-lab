name: Deploy SRE Agent Lab

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - demo
          - sbox
        default: sbox
      plan:
        description: "Run Terraform plan"
        type: boolean
        default: true
      apply:
        description: "Run Terraform apply"
        type: boolean
        default: true

  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment || 'sbox' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v2.1.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3.1.0
        with:
          terraform_wrapper: false

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Terraform init
        run: terraform -chdir=infra/terraform init -backend-config=backend/${{ env.ENVIRONMENT }}.backend.tfvars

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

      - name: Terraform plan
        run: terraform -chdir=infra/terraform plan -out=tfplan -var-file=environments/${{ env.ENVIRONMENT }}.tfvars

      - name: Terraform apply
        run: terraform -chdir=infra/terraform apply -auto-approve tfplan

      - name: Read Terraform outputs
        id: tf
        shell: bash
        run: |
          set -euo pipefail

          TF_OUT="$(terraform -chdir=infra/terraform output -json)"
          read_tf() { echo "$TF_OUT" | jq -r ".${1}.value // empty"; }

          echo "apps_enabled=$(read_tf apps_enabled)" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(read_tf acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(read_tf acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "orders_api_name=$(read_tf orders_api_name)" >> "$GITHUB_OUTPUT"
          echo "change_lookup_name=$(read_tf change_lookup_name)" >> "$GITHUB_OUTPUT"
          echo "agent_id=$(read_tf agent_id)" >> "$GITHUB_OUTPUT"

      - name: Build and update Container Apps
        if: steps.tf.outputs.apps_enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ACR_NAME="${{ steps.tf.outputs.acr_name }}"
          ACR_LOGIN_SERVER="${{ steps.tf.outputs.acr_login_server }}"
          ORDERS_API_NAME="${{ steps.tf.outputs.orders_api_name }}"
          CHANGE_LOOKUP_NAME="${{ steps.tf.outputs.change_lookup_name }}"
          AGENT_ID="${{ steps.tf.outputs.agent_id }}"
          RG="$(echo "$AGENT_ID" | cut -d/ -f5)"

          if [[ -z "$ACR_NAME" || -z "$ACR_LOGIN_SERVER" || -z "$ORDERS_API_NAME" || -z "$CHANGE_LOOKUP_NAME" ]]; then
            echo "Terraform outputs for Container Apps are empty; skipping image build and update."
            exit 0
          fi

          echo "Building images in ACR: $ACR_NAME"

          az acr build --registry "$ACR_NAME" --image orders-api:latest src/orders-api/
          az acr build --registry "$ACR_NAME" --image change-lookup:latest src/change-lookup/

          echo "Updating Container Apps…"

          az containerapp update \
            --name "$ORDERS_API_NAME" \
            --resource-group "$RG" \
            --image "$ACR_LOGIN_SERVER/orders-api:latest" \
            --output none

          az containerapp update \
            --name "$CHANGE_LOOKUP_NAME" \
            --resource-group "$RG" \
            --image "$ACR_LOGIN_SERVER/change-lookup:latest" \
            --output none

      - name: Run core post-provision setup
        shell: bash
        run: bash scripts/post-provision.sh
        continue-on-error: true
