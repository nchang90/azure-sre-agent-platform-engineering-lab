name: Deploy SRE Agent Lab

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - demo
          - sbox
        default: sbox
      plan:
        description: "Run Terraform plan"
        type: boolean
        default: true
      apply:
        description: "Run Terraform apply"
        type: boolean
        default: true

  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment || 'sbox' }}
      TF_VAR_service_now_password: ${{ secrets.SERVICENOW_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v2.1.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3.1.0
        with:
          terraform_wrapper: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Terraform init
        run: terraform -chdir=infra/terraform init -backend-config=backend/${{ env.ENVIRONMENT }}.backend.tfvars

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

      - name: Terraform plan
        run: terraform -chdir=infra/terraform plan -out=tfplan -var-file=environments/${{ env.ENVIRONMENT }}.tfvars

      - name: Terraform apply
        run: terraform -chdir=infra/terraform apply -auto-approve tfplan

      - name: Deploy AKS workload
        shell: bash
        run: |
          set -euo pipefail

          TF_OUT="$(terraform -chdir=infra/terraform output -json)"
          read_tf() { echo "$TF_OUT" | jq -r ".${1}.value // empty"; }

          AKS_NAME="$(read_tf aks_name)"
          if [[ -z "$AKS_NAME" ]]; then
            echo "AKS stack is disabled for this environment; skipping AKS workload deployment."
            exit 0
          fi

          AGENT_ID="$(read_tf agent_id)"
          RG="$(echo "$AGENT_ID" | cut -d/ -f5)"

          az aks get-credentials \
            --resource-group "$RG" \
            --name "$AKS_NAME" \
            --admin \
            --overwrite-existing

          kubectl apply -f infra/k8s/orders-api.yaml
          kubectl rollout status deployment/orders-api --namespace default --timeout=180s

      - name: Build and update Container Apps
        shell: bash
        run: |
          set -euo pipefail

          TF_OUT="$(terraform -chdir=infra/terraform output -json)"
          read_tf() { echo "$TF_OUT" | jq -r ".${1}.value // empty"; }

          ACR_NAME="$(read_tf acr_name)"
          if [[ -z "$ACR_NAME" ]]; then
            echo "Container Apps stack is disabled for this environment; skipping image build and app updates."
            exit 0
          fi

          ACR_LOGIN_SERVER="$(read_tf acr_login_server)"
          ORDERS_API_NAME="$(read_tf orders_api_name)"
          CHANGE_LOOKUP_NAME="$(read_tf change_lookup_name)"
          AGENT_ID="$(read_tf agent_id)"
          RG="$(echo "$AGENT_ID" | cut -d/ -f5)"

          echo "Building images in ACR: $ACR_NAME"

          az acr build --registry "$ACR_NAME" --image orders-api:latest src/orders-api/
          az acr build --registry "$ACR_NAME" --image change-lookup:latest src/change-lookup/

          echo "Updating Container Apps…"

          az containerapp update \
            --name "$ORDERS_API_NAME" \
            --resource-group "$RG" \
            --image "$ACR_LOGIN_SERVER/orders-api:latest" \
            --output none

          az containerapp update \
            --name "$CHANGE_LOOKUP_NAME" \
            --resource-group "$RG" \
            --image "$ACR_LOGIN_SERVER/change-lookup:latest" \
            --output none

      - name: Apply recipe extras
        shell: bash
        run: bash scripts/apply-extras.sh "${ENVIRONMENT}"
        continue-on-error: true
