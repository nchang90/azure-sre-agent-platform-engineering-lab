name: Destroy SRE Agent Lab

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm manual resource teardown"
        required: true
        type: string
  schedule:
    # GitHub Actions cron is in UTC. This runs daily at 21:00 UTC.
    - cron: "0 21 * * *"

permissions:
  contents: read

concurrency:
  group: sre-agent-destroy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate confirmation input
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "Confirmation failed. Type DESTROY to run this workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir=infra init

      - name: Terraform destroy
        run: terraform -chdir=infra destroy -auto-approve -var-file=terraform.tfvars
