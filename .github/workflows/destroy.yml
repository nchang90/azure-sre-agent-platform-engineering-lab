name: Destroy SRE Agent Lab

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - demo
          - sbox
        default: demo
      destroy:
        description: "tf_destroy"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: sre-agent-destroy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_service_now_password: ${{ secrets.SERVICENOW_PASSWORD }}

    steps:
      - name: Validate confirmation input
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.destroy }}" != "true" ]; then
            echo "Destroy not confirmed. Exiting."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure CLI login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir=infra/terraform init -backend-config=backend/${{ inputs.environment }}.backend.tfvars

      - name: Terraform destroy
        run: terraform -chdir=infra/terraform destroy -auto-approve -var-file=environments/${{ inputs.environment }}.tfvars
